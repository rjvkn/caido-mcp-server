# aider config for caido-mcp-server.
# Root cause of past CI breakages: aider/GLM committed Go changes without
# running the checks, so lint/test failures (e.g. errcheck in
# cmd/cli/encode_test.go, CI run 29008890442) only surfaced on CI.
#
# auto-test makes aider run the gate after each edit and try to fix failures
# before committing. The command mirrors CI's lint + test jobs. Keep it in sync
# with .githooks/pre-push and .github/workflows/ci.yml.
auto-test: true
test-cmd: "gofmt -l . | (grep . && exit 1 || true) && go vet ./... && golangci-lint run ./... && go test ./... -count=1"
